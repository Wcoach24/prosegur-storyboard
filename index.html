<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prosegur Security — Storyboard Visual V6.1</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f5f0;--card:#fff;--card-hover:#fafafa;--border:#e0e0e0;--gold:#FFD102;--gold-dk:#c9a600;--text:#1a1a1a;--text-dim:#555;--text-mut:#888;--green:#2e7d32;--blue:#1565c0;--purple:#7b1fa2;--shadow:0 2px 12px rgba(0,0,0,.06);--shadow-h:0 6px 24px rgba(0,0,0,.1)}
[data-theme=dark]{--bg:#08080a;--card:#111114;--card-hover:#18181c;--border:#2a2a30;--text:#e8e6e3;--text-dim:#8a8a8f;--text-mut:#5a5a5f;--green:#4CAF50;--blue:#42A5F5;--purple:#CE93D8;--shadow:0 2px 12px rgba(0,0,0,.3);--shadow-h:0 6px 24px rgba(0,0,0,.5)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Poppins',sans-serif;line-height:1.6;transition:background .3s,color .3s}
.hdr{padding:40px 48px 28px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:20px}
.hdr h1{font-size:28px;font-weight:800;letter-spacing:-1px}.hdr h1 span{color:var(--gold-dk)}[data-theme=dark] .hdr h1 span{color:var(--gold)}
.hdr .sub{font-size:13px;color:var(--text-dim);margin-top:4px}
.hdr-r{text-align:right}.hdr-r .brand{font-size:14px;font-weight:700;color:var(--gold-dk)}[data-theme=dark] .hdr-r .brand{color:var(--gold)}
.toggle{position:fixed;top:16px;right:16px;z-index:999;background:var(--card);border:1px solid var(--border);border-radius:50px;padding:8px 16px;cursor:pointer;font-size:13px;font-family:inherit;color:var(--text);box-shadow:var(--shadow);transition:all .3s}.toggle:hover{box-shadow:var(--shadow-h)}
</style>
</head>
<body>
<div class="hdr">
<h1>Prosegur Security <span>Storyboard</span></h1>
</div>
</body>
</html>
